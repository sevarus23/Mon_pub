# Добавить эти location блоки в nginx.prod.conf проекта reestr-mvp
# Внутрь блока: server { listen 443 ssl; ... }
# Перед закрывающей скобкой }

# --- Mon_pub: Backend API ---
location /mon_pub/api/ {
    proxy_pass http://mon_backend:8001/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- Mon_pub: Health check ---
location = /mon_pub/health {
    proxy_pass http://mon_backend:8001/health;
}

# --- Mon_pub: Next.js static assets (long cache) ---
location /mon_pub/_next/static/ {
    proxy_pass http://mon_frontend:3000/mon_pub/_next/static/;
    proxy_cache_valid 200 365d;
    add_header Cache-Control "public, immutable";
}

# --- Mon_pub: Frontend (Next.js) ---
location /mon_pub {
    proxy_pass http://mon_frontend:3000/mon_pub;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
