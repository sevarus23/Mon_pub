    .lg{fill:none;stroke:#2e7d32;stroke-width:1.1;marker-end:url(#arr-g)}
    .lp{fill:none;stroke:#7b1fa2;stroke-width:1.1;marker-end:url(#arr-p)}
    .ld{fill:none;stroke:#aaa;stroke-width:1;stroke-dasharray:4,3;marker-end:url(#arr)}
